<div id="auth-module">
    
    <div class="glass-card-container">
        <div class="ambient-glow"></div>

        <div class="glass-card">
            
            <div class="auth-header">
                <h2>Terminal <span class="text-gold">Access</span></h2>
                <p>Institutional Identity Verification</p>
            </div>

            <div id="auth-message" class="hidden"></div>

            <div id="google-button-container" style="display: flex; justify-content: center; min-height: 40px; margin-bottom: 10px;">
                </div>

            <div class="divider">
                <span>Or Authenticate via Email</span>
            </div>

            <div id="login-form-container" class="form-container">
                <form id="login-form">
                    <div style="margin-bottom: 15px;">
                        <label class="input-label" for="login-email">Email Identity</label>
                        <input type="email" id="login-email" class="tg-input" required placeholder="trader@fund.com" autocomplete="email">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label class="input-label" for="login-password">Access Key</label>
                        <input type="password" id="login-password" class="tg-input" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    
                    <button type="submit" class="tg-btn-primary">Initialize Session</button>
                </form>
                
                <div class="links">
                    <a href="#" id="forgot-password-link" class="link-text">Forgot Credentials?</a>
                    <a href="#" id="signup-toggle" class="link-accent">Register New Identity</a>
                </div>
            </div>

            <div id="signup-form-container" class="form-container hidden">
                <form id="signup-form">
                    <div style="margin-bottom: 12px;">
                        <label class="input-label" for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" class="tg-input" required autocomplete="name">
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label class="input-label" for="signup-email">Email Identity</label>
                        <input type="email" id="signup-email" class="tg-input" required autocomplete="email">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                        <div>
                            <label class="input-label" for="signup-password">Password</label>
                            <input type="password" id="signup-password" class="tg-input" required autocomplete="new-password">
                        </div>
                        <div>
                            <label class="input-label" for="confirm-password">Confirm</label>
                            <input type="password" id="confirm-password" class="tg-input" required autocomplete="new-password">
                        </div>
                    </div>
                    
                    <button type="submit" class="tg-btn-primary">Create Access Identity</button>
                </form>
                <div class="links" style="justify-content: center;">
                    <a href="#" id="back-to-login-link" class="link-text">Return to Terminal Login</a>
                </div>
            </div>

            <div id="forgot-password-form-container" class="form-container hidden">
                <p style="color: #8B949E; font-size: 0.8rem; text-align: center; margin-bottom: 20px;">
                    Enter your registered email. The system will dispatch a secure reset token.
                </p>
                <form id="forgot-password-form">
                    <div style="margin-bottom: 15px;">
                        <label class="input-label" for="forgot-password-email">Email Identity</label>
                        <input type="email" id="forgot-password-email" class="tg-input" required>
                    </div>
                    <button type="submit" class="tg-btn-primary">Request Reset Token</button>
                </form>
                <div class="links" style="justify-content: center;">
                    <a href="#" id="back-to-login-link2" class="link-text">Return to Terminal Login</a>
                </div>
            </div>

        </div>
    </div>
</div>
