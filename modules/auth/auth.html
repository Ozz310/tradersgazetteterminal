<div id="auth-module" class="relative min-h-[650px] flex items-center justify-center p-4 font-sans">
    
    <div class="relative w-full max-w-md group perspective-1200">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] h-[90%] bg-[#DDAA33]/10 blur-[80px] rounded-full animate-pulse-slow pointer-events-none"></div>

        <div class="relative bg-[#0a0a0a] border border-white/10 rounded-2xl p-8 shadow-2xl overflow-hidden backdrop-blur-xl">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#DDAA33] to-transparent opacity-50 animate-scan pointer-events-none"></div>

            <div class="text-center mb-8">
                <h2 class="text-3xl font-serif font-bold text-white mb-2 tracking-tight">Terminal <span class="text-[#DDAA33]">Access</span></h2>
                <p class="text-[#8B949E] text-xs uppercase tracking-widest">Institutional Identity Verification</p>
            </div>

            <div id="auth-message" class="hidden mb-6 p-3 rounded bg-white/5 border border-white/10 text-center text-sm"></div>

            <div class="mb-8">
                <div id="google-button-container" class="min-h-[40px] flex justify-center">
                    <div class="w-6 h-6 border-2 border-[#DDAA33] border-t-transparent rounded-full animate-spin"></div>
                </div>
                
                <div class="relative my-6 text-center">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <span class="relative bg-[#0a0a0a] px-2 text-[10px] text-[#8B949E] uppercase tracking-wider">Or Authenticate via Email</span>
                </div>
            </div>

            <div id="login-form-container" class="form-container space-y-5">
                <form id="login-form" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Email Identity</label>
                        <input type="email" id="login-email" required 
                               class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:ring-1 focus:ring-[#DDAA33] focus:outline-none transition-colors placeholder-white/20">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Access Key</label>
                        <input type="password" id="login-password" required 
                               class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:ring-1 focus:ring-[#DDAA33] focus:outline-none transition-colors">
                    </div>
                    
                    <button type="submit" class="w-full py-3 rounded bg-[linear-gradient(145deg,#F0D788,#DDAA33)] text-black font-bold text-sm uppercase tracking-wide hover:shadow-[0_0_20px_rgba(221,170,51,0.3)] transition-all transform hover:-translate-y-0.5 active:scale-95">
                        Initialize Session
                    </button>
                </form>
                
                <div class="flex justify-between text-xs mt-6 pt-4 border-t border-white/5">
                    <a href="#" id="forgot-password-link" class="text-[#8B949E] hover:text-[#DDAA33] transition-colors">Forgot Credentials?</a>
                    <a href="#" id="signup-toggle" class="text-[#DDAA33] hover:underline font-semibold">Register New Identity</a>
                </div>
            </div>

            <div id="signup-form-container" class="form-container hidden space-y-5">
                <form id="signup-form" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Full Name</label>
                        <input type="text" id="signup-name" required 
                               class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Email Identity</label>
                        <input type="email" id="signup-email" required 
                               class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Password</label>
                            <input type="password" id="signup-password" required 
                                   class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Confirm</label>
                            <input type="password" id="confirm-password" required 
                                   class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:outline-none">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full py-3 rounded bg-[linear-gradient(145deg,#F0D788,#DDAA33)] text-black font-bold text-sm uppercase tracking-wide hover:shadow-[0_0_20px_rgba(221,170,51,0.3)] transition-all">
                        Create Access Identity
                    </button>
                </form>
                <div class="text-center text-xs mt-6 pt-4 border-t border-white/5">
                    <a href="#" id="back-to-login-link" class="text-[#8B949E] hover:text-[#DDAA33]">Return to Terminal Login</a>
                </div>
            </div>

            <div id="forgot-password-form-container" class="form-container hidden space-y-5">
                <p class="text-xs text-[#8B949E] text-center mb-4 leading-relaxed">Enter your registered email address. The system will dispatch a secure reset token if the identity exists.</p>
                <form id="forgot-password-form" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-[#8B949E] uppercase tracking-wider pl-1">Email Identity</label>
                        <input type="email" id="forgot-password-email" required 
                               class="w-full bg-[#111] border border-white/10 rounded px-4 py-3 text-white text-sm focus:border-[#DDAA33] focus:outline-none">
                    </div>
                    <button type="submit" class="w-full py-3 rounded bg-[linear-gradient(145deg,#F0D788,#DDAA33)] text-black font-bold text-sm uppercase tracking-wide hover:shadow-[0_0_20px_rgba(221,170,51,0.3)] transition-all">
                        Request Reset Token
                    </button>
                </form>
                <div class="text-center text-xs mt-6 pt-4 border-t border-white/5">
                    <a href="#" id="back-to-login-link2" class="text-[#8B949E] hover:text-[#DDAA33]">Return to Terminal Login</a>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    /* Security Scan Animation */
    @keyframes scan {
        0% { transform: translateX(-100%); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateX(100%); opacity: 0; }
    }
    .animate-scan { animation: scan 3s infinite ease-in-out; }
    .perspective-1200 { perspective: 1200px; }
</style>
