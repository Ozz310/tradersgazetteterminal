<div id="auth-module" class="auth-box terminal-shadow">
    <div class="auth-header">
        <h1 class="logo-text">The Traders Gazette</h1>
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Enter and confirm your new password below.</p>
    </div>

    <div id="auth-message" class="auth-message" style="display: none;"></div>

    <div id="reset-password-container" class="form-container">
        <form id="reset-password-form" class="auth-form">
            <div class="input-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" name="new-password" required minlength="6" placeholder="Enter new password">
            </div>
            <div class="input-group">
                <label for="confirm-new-password">Confirm Password</label>
                <input type="password" id="confirm-new-password" name="confirm-new-password" required minlength="6" placeholder="Confirm new password">
            </div>
            <button type="submit" class="auth-btn primary-btn" id="reset-password-submit-btn">
                Set New Password
            </button>
        </form>
    </div>

    <div class="auth-footer">
        <a href="#auth" id="back-to-login-link-reset" class="footer-link">Back to Login</a>
    </div>
</div>
