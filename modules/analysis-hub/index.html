<div class="analysis-hub-container fade-in">
    
    <div class="analysis-cover-photo"></div>

    <div class="analysis-content-wrapper">
        
        <div class="section-header">
            <h2 class="section-title">Market <span class="gold-text">Intelligence</span></h2>
            <p class="section-subtitle">Advanced Charting & Economic Data Stream</p>
        </div>

        <div class="chart-section">
            <div class="panel-header">
                <i class="fas fa-chart-candlestick"></i> ADVANCED CHARTING
            </div>
            
            <div class="tradingview-widget-container">
                <div id="tradingview_chart"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "OANDA:XAUUSD",
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_chart"
                });
                </script>
            </div>
        </div>

        <div class="calendar-section">
            <div class="panel-header">
                <i class="fas fa-calendar-alt"></i> ECONOMIC DATA
            </div>
            
            <div class="calendar-wrapper">
                <iframe 
                    src="https://www.myfxbook.com/widget/calendar.html" 
                    class="calendar-iframe"
                    scrolling="yes" 
                    sandbox="allow-scripts allow-same-origin allow-forms">
                </iframe>
            </div>
        </div>

    </div>
</div>
