<div class="analysis-hub-container fade-in">
    
    <div class="analysis-cover-photo">
        <div class="banner-overlay"></div>
    </div>

    <div class="analysis-content-wrapper">
        
        <div class="section-header">
            <h2 class="section-title">Market <span class="gold-text">Intelligence</span></h2>
            <p class="section-subtitle">Advanced Charting & Economic Data Stream</p>
        </div>

        <div class="chart-section">
            <div class="panel-header">
                <i class="fas fa-chart-candlestick"></i> ADVANCED CHARTING
            </div>
            
            <div class="tradingview-widget-container" id="tv-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                  "autosize": true,
                  "symbol": "OANDA:XAUUSD",
                  "interval": "D",
                  "timezone": "Etc/UTC",
                  "theme": "dark",
                  "style": "1",
                  "locale": "en",
                  "enable_publishing": false,
                  "hide_top_toolbar": false,
                  "hide_legend": false,
                  "save_image": true,
                  "backgroundColor": "#0F0F0F",
                  "gridColor": "rgba(242, 242, 242, 0.06)",
                  "container_id": "tv-container"
                }
                </script>
            </div>
        </div>

        <div class="calendar-section">
            <div class="panel-header">
                <i class="fas fa-calendar-alt"></i> ECONOMIC DATA
            </div>
            
            <div class="calendar-wrapper">
                <iframe 
                    src="https://widgets.myfxbook.com/custom-widget/calendar.html?width=100%&height=600" 
                    class="calendar-iframe"
                    scrolling="yes">
                </iframe>
            </div>
        </div>
    </div>
</div>
