<div class="analysis-hub-container fade-in">
    
    <div class="analysis-header">
        <h2 class="section-title">Market <span class="gold-text">Intelligence</span></h2>
        <div class="view-controls">
            <button class="view-btn active" id="btn-chart">Chart</button>
            <button class="view-btn" id="btn-calendar">Calendar</button>
        </div>
    </div>

    <div class="analysis-grid">
        
        <div class="chart-container" id="chart-sector">
            <div class="panel-header">
                <i class="fas fa-chart-candlestick"></i> ADVANCED CHARTING
            </div>
            
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_chart"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "OANDA:XAUUSD",
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_chart",
                    // Hiding the side toolbar on mobile can help space
                    "hide_side_toolbar": false 
                });
                </script>
            </div>
        </div>

        <div class="calendar-container" id="calendar-sector">
            <div class="panel-header">
                <i class="fas fa-calendar-alt"></i> ECONOMIC DATA
            </div>
            
            <div class="calendar-wrapper">
                <iframe 
                    src="https://www.myfxbook.com/widget/calendar.html" 
                    class="calendar-iframe"
                    scrolling="yes" 
                    sandbox="allow-scripts allow-same-origin allow-forms">
                </iframe>
                
                <div class="redirect-blocker-message">
                    <i class="fas fa-shield-alt"></i> External Redirects Blocked
                </div>
            </div>
        </div>

    </div>
</div>
